<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#15375a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5B700"/>
      <stop offset="100%" stop-color="#D49600"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="300" height="300" rx="48" fill="url(#bgGrad)"/>

  <!-- Inner gold frame (subtle) -->
  <rect x="20" y="20" width="260" height="260" rx="34" fill="none" stroke="#E5A800" stroke-width="2" opacity="0.35"/>

  <!-- Battlement crown above ح -->
  <g fill="url(#goldGrad)">
    <rect x="76" y="58" width="20" height="18"/>
    <rect x="110" y="58" width="20" height="18"/>
    <rect x="144" y="58" width="20" height="18"/>
    <rect x="178" y="58" width="20" height="18"/>
    <rect x="212" y="58" width="20" height="18"/>
    <!-- base bar connecting battlements -->
    <rect x="70" y="76" width="168" height="6"/>
  </g>

  <!-- ح letter -->
  <text x="150" y="218" font-family="'Tajawal', 'Segoe UI', Arial, sans-serif"
        font-size="180" font-weight="800" fill="url(#goldGrad)"
        text-anchor="middle" dominant-baseline="middle">ح</text>

  <!-- Subtle bottom rule + brand text -->
  <line x1="60" y1="252" x2="240" y2="252" stroke="#E5A800" stroke-width="1.5" opacity="0.5"/>
  <text x="150" y="276" font-family="'Tajawal', 'Segoe UI', Arial, sans-serif"
        font-size="20" font-weight="700" fill="#FFFFFF" letter-spacing="4"
        text-anchor="middle">HISN</text>
</svg>
