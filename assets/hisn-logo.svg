<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#15375a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5B700"/>
      <stop offset="100%" stop-color="#D49600"/>
    </linearGradient>
  </defs>

  <!-- Navy rounded background -->
  <rect x="0" y="0" width="300" height="300" rx="48" fill="url(#bgGrad)"/>

  <!-- Subtle inner frame -->
  <rect x="18" y="18" width="264" height="264" rx="36" fill="none" stroke="#E5A800" stroke-width="1.2" opacity="0.22"/>

  <!-- Battlement crown (fortress identity) -->
  <g fill="url(#goldGrad)">
    <rect x="56" y="50" width="28" height="26" rx="2"/>
    <rect x="96" y="50" width="28" height="26" rx="2"/>
    <rect x="136" y="50" width="28" height="26" rx="2"/>
    <rect x="176" y="50" width="28" height="26" rx="2"/>
    <rect x="216" y="50" width="28" height="26" rx="2"/>
    <rect x="46" y="76" width="208" height="12" rx="2"/>
  </g>

  <!--
    ح letterform — built from SVG paths.
    Bowl shape opening upward, with right terminal cap and left tail hook
    (matches the geometric structure of Arabic Hāʾ in display Kufic style).
  -->
  <g fill="url(#goldGrad)">

    <!-- Main bowl: thick-walled U with open top -->
    <path d="
      M 60 135
      L 60 215
      Q 60 250 100 250
      L 210 250
      Q 250 250 250 215
      L 250 135
      L 220 135
      L 220 215
      Q 220 220 215 220
      L 95 220
      Q 90 220 90 215
      L 90 135
      Z"/>

    <!-- Right terminal: short horizontal cap that closes the top-right edge -->
    <rect x="216" y="120" width="44" height="15" rx="2"/>

    <!-- Left tail/hook: descending stroke extending from the lower-left corner of the bowl -->
    <path d="
      M 60 225
      L 80 225
      L 80 258
      Q 80 264 74 264
      L 42 264
      Q 36 264 36 258
      L 36 245
      Q 36 225 56 225
      Z"/>
  </g>

  <!-- HISN wordmark (small, supporting) -->
  <text x="150" y="288"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="800"
        fill="#FFFFFF" opacity="0.6"
        text-anchor="middle"
        letter-spacing="6">HISN</text>
</svg>
