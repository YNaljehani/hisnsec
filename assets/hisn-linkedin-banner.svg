<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="50%" stop-color="#15375a"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5B700"/>
      <stop offset="100%" stop-color="#D49600"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <radialGradient id="glow" cx="78%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E5A800" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#E5A800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#grid)"/>
  <rect width="1128" height="191" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="191" fill="url(#gold)"/>

  <!-- Main tagline -->
  <text x="50" y="76" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="34" font-weight="800" fill="#FFFFFF" letter-spacing="-0.3">
    Fortify what you've built.
  </text>

  <!-- Sub-tagline -->
  <text x="50" y="112" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="18" font-weight="500" fill="#E5A800">
    Cybersecurity for Saudi mid-market companies.
  </text>

  <!-- Pillar tags -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="3" fill="#FFFFFF" opacity="0.75">
    <text x="50" y="156">NCA</text>
    <text x="106" y="156">·</text>
    <text x="122" y="156">PDPL</text>
    <text x="184" y="156">·</text>
    <text x="200" y="156">SAMA</text>
    <text x="268" y="156">·</text>
    <text x="284" y="156">ISO 27001</text>
  </g>

  <!-- Right-side mark: battlements + HISN in a frame -->
  <g transform="translate(900, 30)">
    <rect x="0" y="0" width="180" height="130" rx="12" fill="rgba(255,255,255,0.04)" stroke="#E5A800" stroke-width="1" opacity="0.55"/>

    <!-- Battlement crown -->
    <g fill="#E5A800">
      <rect x="22" y="14" width="14" height="12" rx="1"/>
      <rect x="46" y="14" width="14" height="12" rx="1"/>
      <rect x="70" y="14" width="14" height="12" rx="1"/>
      <rect x="94" y="14" width="14" height="12" rx="1"/>
      <rect x="118" y="14" width="14" height="12" rx="1"/>
      <rect x="142" y="14" width="14" height="12" rx="1"/>
      <rect x="18" y="26" width="142" height="5" rx="1"/>
    </g>

    <!-- HISN wordmark -->
    <text x="90" y="78" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="34" font-weight="900" fill="#E5A800"
          text-anchor="middle" letter-spacing="4">HISN</text>

    <!-- Underline -->
    <line x1="36" y1="92" x2="144" y2="92" stroke="#E5A800" stroke-width="1" opacity="0.5"/>

    <!-- Sub-label -->
    <text x="90" y="110" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
          font-size="9" font-weight="600" fill="#FFFFFF" opacity="0.7"
          text-anchor="middle" letter-spacing="3">CYBERSECURITY</text>
  </g>

  <!-- URL -->
  <text x="1080" y="178" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#FFFFFF" opacity="0.55"
        text-anchor="end">
    hisnsec.com
  </text>
</svg>
