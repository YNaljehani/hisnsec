<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1128 191" width="1128" height="191">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="50%" stop-color="#15375a"/>
      <stop offset="100%" stop-color="#0A2540"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5B700"/>
      <stop offset="100%" stop-color="#E5A800"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.04"/>
    </pattern>
    <radialGradient id="glow" cx="85%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E5A800" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#E5A800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>
  <rect width="1128" height="191" fill="url(#grid)"/>
  <rect width="1128" height="191" fill="url(#glow)"/>

  <!-- Left accent bar (gold) -->
  <rect x="0" y="0" width="6" height="191" fill="url(#gold)"/>

  <!-- Tagline (English) -->
  <text x="50" y="74" font-family="'Tajawal', 'Segoe UI', Arial, sans-serif"
        font-size="34" font-weight="800" fill="#FFFFFF" letter-spacing="-0.3">
    Fortify what you've built.
  </text>

  <!-- Arabic tagline -->
  <text x="50" y="115" font-family="'Tajawal', 'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="500" fill="#E5A800" letter-spacing="0">
    حصّن ما بنيته
  </text>

  <!-- Pillars -->
  <g font-family="'Tajawal', 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="#FFFFFF" opacity="0.78">
    <text x="50" y="158">NCA</text>
    <text x="105" y="158">·</text>
    <text x="120" y="158">PDPL</text>
    <text x="180" y="158">·</text>
    <text x="195" y="158">SAMA</text>
    <text x="262" y="158">·</text>
    <text x="277" y="158">ISO 27001</text>
  </g>

  <!-- Right-side mark: large ح in a subtle frame -->
  <g transform="translate(920, 30)">
    <rect x="0" y="0" width="160" height="130" rx="14" fill="rgba(255,255,255,0.04)" stroke="#E5A800" stroke-width="1" opacity="0.6"/>
    <!-- battlement crown -->
    <g fill="#E5A800">
      <rect x="20" y="14" width="14" height="10"/>
      <rect x="44" y="14" width="14" height="10"/>
      <rect x="68" y="14" width="14" height="10"/>
      <rect x="92" y="14" width="14" height="10"/>
      <rect x="116" y="14" width="14" height="10"/>
      <rect x="16" y="24" width="120" height="4"/>
    </g>
    <text x="80" y="105" font-family="'Tajawal', 'Segoe UI', Arial, sans-serif"
          font-size="78" font-weight="800" fill="#E5A800"
          text-anchor="middle" dominant-baseline="middle">ح</text>
  </g>

  <!-- Bottom-right URL -->
  <text x="1080" y="178" font-family="'Tajawal', 'Segoe UI', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#FFFFFF" opacity="0.55"
        text-anchor="end">
    hisnsec.com
  </text>
</svg>
